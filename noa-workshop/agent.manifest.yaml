# azd-managed agent manifest for the NOA workshop multi-agent workflow.
# Used by `azd ai agent init` and `azd ai agent up`.
#
# Reference: https://learn.microsoft.com/agent-framework/hosting/foundry-hosted-agent

name: noa-multiagent-hosted
description: NOA workshop — Handoff multi-agent team (NOC Manager + telemetry + security + field_ops) coordinated via HandoffBuilder, exposed as one Foundry hosted agent
runtime: python
# Container entrypoint runs `python -m noa_workshop.n6_deployment.hosted_agent_server`,
# which calls `make_server()` to build the workflow lazily and start serving.
entrypoint: noa_workshop.n6_deployment.hosted_agent_server:make_server

# Container image is built from the Dockerfile in the project root.
container:
  dockerfile: Dockerfile
  port: 8088

# Environment variables that must exist at runtime. azd will prompt for these
# during `azd up` if they are not already in the local environment.
env:
  - name: FOUNDRY_PROJECT_ENDPOINT
    required: true
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    required: true
  - name: NOA_USE_HOSTED_AGENTS
    required: false
    default: "false"
