# NOA workshop 多-agent workflow 的 azd-managed agent manifest。
# 由 `azd ai agent init` 與 `azd ai agent up` 讀取使用。
#
# 參考：https://learn.microsoft.com/agent-framework/hosting/foundry-hosted-agent

name: noa-multiagent-hosted
description: NOA workshop — Handoff multi-agent team (NOC Manager + telemetry + security + field_ops) coordinated via HandoffBuilder, exposed as one Foundry hosted agent
runtime: python
# 容器進入點會跑 `python -m noa_workshop.n6_deployment.hosted_agent`，
# 它會呼叫 `make_server()` 延後組裝 workflow 並啟動服務。
entrypoint: noa_workshop.n6_deployment.hosted_agent:make_server

# 容器映像檔由專案根目錄的 Dockerfile 建置。
container:
  dockerfile: Dockerfile
  port: 8088

# 執行時必須存在的環境變數。`azd up` 時若本地環境裡沒有這些變數，azd 會跳出來問你。
env:
  - name: FOUNDRY_PROJECT_ENDPOINT
    required: true
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    required: true
  - name: NOA_USE_HOSTED_AGENTS
    required: false
    default: "false"
